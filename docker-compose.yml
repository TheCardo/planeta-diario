version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: planetadiario-db
    environment:
      POSTGRES_DB: planetadiario
      POSTGRES_USER: ricardo
      POSTGRES_PASSWORD: pirao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - planeta-network

  backend:
    build: .
    container_name: planetadiario-api
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/planetadiario
      - SPRING_DATASOURCE_USERNAME=ricardo
      - SPRING_DATASOURCE_PASSWORD=pirao
    networks:
      - planeta-network

  frontend:
    build: ./planeta-diario-front
    container_name: planetadiario-web
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - planeta-network

volumes:
  pgdata:

networks:
  planeta-network:
    driver: bridge